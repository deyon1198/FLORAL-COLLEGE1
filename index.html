<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>FLORAL PRIVATE COLLEGE OKORO-IDIROKO</title>
<style>
*{margin:0; padding:0; box-sizing:border-box; font-family:'Segoe UI', sans-serif}
body{background:#f5f7fa}
.header{background:linear-gradient(135deg,#2c5530,#4a7c59); color:white; padding:15px; text-align:center}
.logo{width:90px; height:90px; border-radius:50%; margin:0 auto 10px; display:block; background:white; padding:8px}
.nav{display:flex; justify-content:space-around; background:white; padding:10px; box-shadow:0 2px 5px rgba(0,0,0,0.1)}
.nav button{border:none; background:none; padding:10px; color:#2c5530; font-weight:bold; cursor:pointer}
.tab{padding:15px; display:none}
.tab.active{display:block}
.card{background:white; padding:15px; margin:10px 0; border-radius:8px; box-shadow:0 2px 5px rgba(0,0,0,0.1)}
.btn{background:#4a7c59; color:white; border:none; padding:10px 15px; border-radius:5px; cursor:pointer}
.post-img{width:100%; border-radius:8px; margin-top:10px}
</style>
</head>
<body>

<div class="header">
  <h1>FLORAL PRIVATE COLLEGE</h1>
  <p>Okoro-Idiroko, Ogun State</p>
</div>

<div class="nav">
  <button onclick="showTab('home')">Home</button>
  <button onclick="showTab('announce')">Announcements</button>
  <button onclick="showTab('notes')">Notes</button>
  <button onclick="showTab('about')">About</button>
</div>

<div id="home" class="tab active"><div class="card"><h2>Welcome</h2></div></div>
<div id="announce" class="tab"><div id="annList">Loading...</div></div>
<div id="notes" class="tab"><div id="noteList">Loading...</div></div>
<div id="about" class="tab"><div class="card"><h2>About</h2><p>Okoro-Idiroko, Ogun State</p></div></div>

<script>
let sheetUrl = 'https://docs.google.com/spreadsheets/d/1oKWyDZHQyYemsr12z7vYPBEVJJyzqZiR0k6kaCyfKxw/gviz/tq?tqx=out:csv';

function showTab(tab){
  document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
  document.getElementById(tab).classList.add('active');
}

async function loadDataFromSheet(){
  let res = await fetch(sheetUrl);
  let text = await res.text();
  let rows = text.split('\n').slice(1);
  
  let announcements = [];
  rows.forEach(row => {
    let cols = row.split(',');
    if(cols[0] === 'notice'){
      announcements.push({title:cols[3], text:cols[4], date:cols[2]});
    }
  });
  
  let html = '';
  announcements.forEach(a=>{
    html += `<div class="card"><h3>${a.title}</h3><p>${a.text}</p><small>${a.date}</small></div>`;
  });
  document.getElementById('annList').innerHTML = html || '<p>No announcements yet</p>';
}

loadDataFromSheet();
</script>
</body>
</html>
