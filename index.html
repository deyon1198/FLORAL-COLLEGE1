<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>FLORAL COLLEGE WALL</title>
<script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-firestore-compat.js"></script>
<style>
body{font-family:Arial;background:linear-gradient(to bottom,#ffe4ec,#fff);text-align:center;padding:15px;margin:0}
h1{color:#d63384}
input,textarea{width:90%;padding:12px;margin:8px 0;border:2px solid #d63384;border-radius:8px;font-size:16px}
button{background:#d63384;color:white;padding:12px 30px;border:none;border-radius:8px;font-size:16px;cursor:pointer}
#wall{margin-top:20px;text-align:left;max-width:600px;margin:auto}
.post{background:white;padding:15px;margin:10px 0;border-radius:10px;box-shadow:0 2px 5px rgba(0,0,0,0.1)}
.post b{color:#d63384}
</style>
</head>
<body>
<h1>🌸 FLORAL COLLEGE WALL 🌸</h1>
<input id="name" placeholder="Your Name">
<textarea id="msg" placeholder="Write something for FLORAL COLLEGE..." rows="3"></textarea>
<button onclick="post()">POST</button>
<div id="wall"><p>Loading messages...</p></div>

<script>
const firebaseConfig = {
  apiKey: "AIzaSyB_fake_key_replace_later",
  authDomain: "floral-college-wall-26dba.firebaseapp.com",
  projectId: "floral-college-wall-26dba",
};
firebase.initializeApp(firebaseConfig);
const db = firebase.firestore();

function post(){
  let name = document.getElementById('name').value || "Anonymous";
  let msg = document.getElementById('msg').value;
  if(msg.trim() === '') return alert("Type something first");
  
  db.collection("floral_college_wall").add({
    name: name,
    message: msg,
    time: Date.now()
  }).then(()=>{
    document.getElementById('msg').value = '';
  }).catch(err=>alert("Error: "+err.message));
}

db.collection("floral_college_wall").orderBy("time","desc").onSnapshot(snap=>{
  let html = '';
  snap.forEach(doc=>{
    let d = doc.data();
    html += `<div class="post"><b>${d.name}</b><p>${d.message}</p></div>`
  });
  document.getElementById('wall').innerHTML = html || "<p>No messages yet. Be the first!</p>";
});
</script>
</body>
</html>
